<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #eaf1ff;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 360px;
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
      color: #0a2e63;
    }

    p {
      margin-bottom: 20px;
      font-weight: bold;
      color: #444;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      text-align: left;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #1a3cd4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
      box-sizing: border-box;
    }

    button:hover {
      background-color: #0d2fa0;
    }

    .error {
      color: red;
      margin-top: 15px;
      font-size: 14px;
    }
    
    .requirements {
        text-align: left;
        font-size: 12px;
        color: #666;
        margin-top: 10px;
    }
    .requirements ul {
        padding-left: 20px;
        margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <h2>Security Update</h2>
      <p>Please change your password to continue.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <label for="new_password">New Password:</label>
        <input type="password" id="new_password" name="new_password" required>

        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        
        <div class="requirements">
            Password must be at least 12 characters long and contain:
            <ul>
                <li>Uppercase letter</li>
                <li>Lowercase letter</li>
                <li>Number</li>
                <li>Special character</li>
            </ul>
        </div>

        <button type="submit">Update Password</button>
      </form>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </div>
  </div>
</body>
</html>

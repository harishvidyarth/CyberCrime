<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <style>
    /* v3 UI — offline-safe (system fonts). Form + CSRF + requirements unchanged. */
    :root{
      --navy-800:#0a2e63; --brand-600:#1e40af; --brand-500:#2451d6;
      --ink-900:#0f172a; --ink-600:#475569; --ink-400:#94a3b8; --line:#e6eaf2; --bg:#eef2fb;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--font);background:
        radial-gradient(1000px 500px at 50% -10%,#dbe6ff,transparent 60%),var(--bg);
        color:var(--ink-900);-webkit-font-smoothing:antialiased}

    .floating-back{position:fixed;top:16px;right:22px;z-index:1000;display:inline-flex;align-items:center;gap:8px;
      text-decoration:none;background:linear-gradient(180deg,var(--brand-500),var(--brand-600));color:#fff;
      font-weight:650;font-size:14px;padding:10px 18px;border-radius:999px;
      box-shadow:0 12px 26px -8px rgba(8,28,71,.6);transition:filter .15s,transform .06s}
    .floating-back:hover{filter:brightness(1.08)} .floating-back:active{transform:translateY(1px)}

    .container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .box{background:#fff;padding:38px 34px;border-radius:16px;border:1px solid var(--line);
      box-shadow:0 26px 60px -28px rgba(8,28,71,.5);width:400px;text-align:center}
    h2{margin:0 0 6px;color:var(--navy-800);font-size:23px;font-weight:740;letter-spacing:-.3px}
    p.lead{margin:0 0 22px;color:var(--ink-600);font-size:14.5px}

    label{display:block;margin:14px 0 6px;text-align:left;font-weight:600;font-size:13px;color:var(--ink-600)}
    input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;
      transition:border-color .15s,box-shadow .15s}
    input:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 4px rgba(36,81,214,.14)}

    button{margin-top:22px;width:100%;padding:13px;background:linear-gradient(180deg,var(--brand-500),var(--brand-600));
      color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:650;font-family:inherit;cursor:pointer;
      box-shadow:0 10px 20px -10px rgba(30,64,175,.55);transition:filter .15s,transform .06s}
    button:hover{filter:brightness(1.06)} button:active{transform:translateY(1px)}

    .error{color:#b91c1c;margin-top:15px;font-size:14px;font-weight:600}
    .requirements{text-align:left;font-size:12.5px;color:var(--ink-600);margin-top:14px;
      background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
    .requirements ul{padding-left:18px;margin:6px 0 0}
    .requirements li{margin:2px 0}
  </style>
</head>
<body>
  <a href="{{ url_for('index') }}" class="floating-back" title="Back to Dashboard">&larr; Dashboard</a>

  <div class="container">
    <div class="box">
      <h2>Security Update</h2>
      <p class="lead">Please change your password to continue.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>

        <div class="requirements">
            Password must be at least 12 characters long and contain:
            <ul>
                <li>Uppercase letter</li>
                <li>Lowercase letter</li>
                <li>Number</li>
                <li>Special character</li>
            </ul>
        </div>

        <button type="submit">Update Password</button>
      </form>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </div>
  </div>
</body>
</html>

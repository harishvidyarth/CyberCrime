<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<style>
  /* v3 UI — offline-safe shared error page (used by 403 / 404 / 500). */
  :root{
    --navy-900:#06182f; --navy-800:#0a2e63; --navy-700:#103a82;
    --brand-600:#1e40af; --brand-500:#2451d6; --gold:#f5b301;
    --ink-900:#0f172a; --ink-600:#475569; --line:#e6eaf2;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    font-family:var(--font);-webkit-font-smoothing:antialiased;color:var(--ink-900);
    background:radial-gradient(1100px 500px at 50% -10%,#e7eefc,transparent 60%),#f2f4f9;}
  .container{position:relative;text-align:center;background:#fff;padding:48px 44px;border-radius:18px;
    border:1px solid var(--line);box-shadow:0 30px 60px -30px rgba(8,28,71,.5);max-width:480px;width:100%;overflow:hidden;}
  .container::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--navy-800),var(--brand-500),var(--gold));}
  .error-code{font-size:84px;line-height:1;font-weight:800;letter-spacing:-2px;
    background:linear-gradient(180deg,var(--brand-500),var(--navy-800));-webkit-background-clip:text;background-clip:text;color:transparent;}
  h2{margin:14px 0 6px;font-size:22px;font-weight:740;color:var(--navy-800);}
  .message{font-size:15.5px;color:var(--ink-600);margin:0 0 26px;line-height:1.55;}
  a.home{display:inline-flex;align-items:center;gap:9px;padding:12px 22px;font-size:15px;font-weight:650;color:#fff;
    text-decoration:none;border-radius:11px;background:linear-gradient(180deg,var(--brand-500),var(--brand-600));
    box-shadow:0 12px 24px -10px rgba(30,64,175,.6);transition:filter .15s;}
  a.home:hover{filter:brightness(1.07);}
  .hint{margin-top:18px;font-size:12.5px;color:#94a3b8;}
</style>
</head>
<body>
  <div class="container">
    <div class="error-code">{{ code }}</div>
    <h2>{{ title }}</h2>
    <p class="message">{{ message }}</p>
    <a class="home" href="{{ url_for('role_home') }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/></svg>
      Return to Home
    </a>
    <div class="hint">This takes you to your own dashboard.</div>
  </div>
</body>
</html>

# Feature E23: CI — run both FundTrail test suites and a dependency CVE audit on
# every push/PR, so regressions (like the secret-key fallback that once crept
# back in) are caught automatically.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: main/requirements.txt
      - name: Install dependencies
        run: pip install -r main/requirements.txt
      - name: Smoke tests
        working-directory: main
        run: python tests/smoke_test.py
      - name: Access-control tests
        working-directory: main
        run: python tests/test_access_control.py
      - name: Pytest with coverage
        run: pytest --cov=main --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependency CVE audit
        run: |
          pip install bandit pip-audit
          bandit --ini .bandit -r main/app.py main/models.py main/ifsc_utils.py main/scripts main/tests -f json
          pip-audit -r main/requirements.txt --no-deps
      - name: GitGuardian secret scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          pip install ggshield
          ggshield scan path .
      - name: SOOS SCA
        uses: soos-io/soos-sca-github-action@v2
        with:
          project_name: ${{ github.repository }}
          client_id: ${{ secrets.SOOS_CLIENT_ID }}
          api_key: ${{ secrets.SOOS_API_KEY }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ruff
        run: |
          pip install ruff
          ruff check main/ dev_seed.py

# Feature E24: lint configuration. Run locally with:  ruff check main/ dev_seed.py
[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [".venv", ".venv311", "migrations", "build", "dist"]

[tool.ruff.lint]
# Start pragmatic: errors, pyflakes (dead imports/vars), and bugbear-style basics.
# Style-only rules stay off until the legacy monolith is split (see docs/).
select = ["E4", "E7", "E9", "F", "B"]
ignore = [
    "E722",  # bare except — used deliberately as defensive guards in legacy paths
    "B008",  # function call in default arg — Flask/SQLAlchemy idiom
    "E701",  # one-line compound statements — pervasive legacy/test idiom; style only
    "E702",  # semicolon-separated statements — same as above
    "E741",  # ambiguous single-letter names — used in legacy maths/loops
]

[tool.pytest.ini_options]
testpaths = ["main/tests"]
python_files = ["test_*.py", "pytest_*.py"]

[tool.ruff.lint.per-file-ignores]
# app.py interleaves imports with config on purpose (load_dotenv before model
# imports, conditional msvcrt/fcntl); tests set sys.path before importing app.
"main/app.py" = ["E402"]
"main/tests/*" = ["E402", "E401"]
"dev_seed.py" = ["E402"]

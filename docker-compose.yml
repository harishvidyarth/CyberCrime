# FundTrail — optional Docker setup
# Purpose: one identical dev environment for the whole team + reproducible Linux
# builds. NOT required to ship the offline .exe (that stays SQLite + PyInstaller).
#
#   docker compose up --build      # app on http://localhost:5000
#   docker compose --profile mysql up   # also start MySQL (central-server option)
#
version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Generate a real one for anything beyond local dev:
      #   python3 -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: "dev-only-change-me-${RANDOM}"
      SESSION_COOKIE_INSECURE: "true"   # local http dev only
      FLASK_DEBUG: "false"
      # Default = SQLite (no DB service needed). For MySQL, uncomment + use profile:
      # DATABASE_URL: "mysql+pymysql://fundtrail:CHANGE_ME@db:3306/fundtrail"
    volumes:
      - ./main:/app/main          # live code reload during dev
      - fundtrail_data:/app/data  # persist SQLite across restarts
    working_dir: /app/main
    command: python app.py

  # Optional MySQL — only starts with: docker compose --profile mysql up
  db:
    image: mysql:8
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: "change_me_root"
      MYSQL_DATABASE: "fundtrail"
      MYSQL_USER: "fundtrail"
      MYSQL_PASSWORD: "change_me_app"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  fundtrail_data:
  mysql_data:
